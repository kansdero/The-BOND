<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Deployment Editor</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
  --accent: #ffb000; /* ✅ brighter amber */
  --bg: #111;
  --surface: #1a1a1a;
  --border: #333;
  --text: #f0f0f0;
}

body {font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0}

.topbar{display:flex;gap:10px;padding:10px;background:#1a1a1a}
.btn-dl{background:var(--accent);border:none;padding:8px 12px;border-radius:6px;color:#fff;cursor:pointer}

.main{padding:20px}

/* export preview */
#exportWrap{position:fixed;left:-9999px;top:0}

/* toast */
#toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#222;padding:10px 18px;border-radius:30px;color:#fff;
opacity:0;transition:.3s
}
#toast.show{opacity:1}
</style>
</head>

<body>

<div class="topbar">
  <button class="btn-dl" onclick="previewJPEG()">👁 Preview</button>
  <button class="btn-dl" onclick="downloadJPEG()">⬇ Download</button>
</div>


<div class="main">
  <p>Add agents and zones using your existing logic...</p>
</div>


<div id="exportWrap"></div>
<div id="toast"></div>


<script>

/* DEMO STATE (kept from your logic) */
let S = {
  serviceName:"Sunday Service",
  theme:'amber',
  active:["lakeside","haven","ducati","support","tally"],
  zones:[
    {id:"lakeside",name:"Lakeside"},
    {id:"haven",name:"Haven"},
    {id:"ducati",name:"Ducati"},
    {id:"support",name:"Support"},
    {id:"tally",name:"Tally"}
  ],
  agents:[
    {id:"1",name:"John"},
    {id:"2",name:"Mike"},
    {id:"3",name:"Sarah"},
    {id:"4",name:"David"},
    {id:"5",name:"Peter"},
    {id:"6",name:"Paul"},
    {id:"7",name:"James"},
    {id:"8",name:"Brian"},
    {id:"9",name:"Kevin"}
  ],
  za:{
    lakeside:[{agentId:"1"},{agentId:"2"},{agentId:"3"},{agentId:"4"},{agentId:"5"},{agentId:"6"},{agentId:"7"}],
    haven:[{agentId:"8"},{agentId:"9"}],
    ducati:[],
    support:[],
    tally:[]
  }
};


/* ✅ BUILD EXPORT */
function buildExportHTML(){

  const acc='#ffb000';

  const zonesHTML = S.active.map(zid=>{
    const zone=S.zones.find(z=>z.id===zid);

    const agents=(S.za[zid]||[]).map(za=>{
      const a=S.agents.find(x=>x.id===za.agentId);
      if(!a) return '';

      return `
        <div style="
          padding:8px 12px;
          font-size:18px;
          background:#f5f5f5;
          border-radius:8px;
          text-align:center;
        ">
          ${a.name}
        </div>
      `;
    }).join('');

    return `
      <div style="margin-bottom:25px">

        <div style="
          font-family:'Bebas Neue';
          font-size:30px;
          color:${acc};
          margin-bottom:10px
        ">
          ${zone.name}:
        </div>

        <div style="
          display:grid;
          grid-template-columns:repeat(6,1fr);
          gap:8px
        ">
          ${agents || '<div>No agents</div>'}
        </div>

      </div>
    `;
  }).join('');

  const date = new Date().toLocaleDateString('en-ZA');

  return `
  <div style="width:1500px;background:#fff;padding:40px;font-family:'DM Sans'">

    <div style="margin-bottom:30px">
      <div style="font-family:'Bebas Neue';font-size:60px;color:${acc}">
        DEPLOYMENT
      </div>
      <div style="font-size:20px;font-weight:600">${S.serviceName}</div>
      <div style="color:#777">${date}</div>
    </div>

    ${zonesHTML}

    <div style="margin-top:30px;border-top:2px solid ${acc};padding-top:10px;
      display:flex;justify-content:space-between">
      <span style="font-family:'Bebas Neue';font-size:22px;color:${acc}">
        The Bond
      </span>
      <span style="color:#aaa;font-size:12px">
        Confidential · Internal Use Only
      </span>
    </div>

  </div>
  `;
}


/* ✅ PREVIEW */
function previewJPEG(){

  const wrap=document.getElementById('exportWrap');
  wrap.innerHTML=buildExportHTML();

  wrap.style=`
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
  `;

  const content=wrap.firstElementChild;
  content.style.transform="scale(0.6)";

  wrap.onclick=()=>{wrap.innerHTML='';wrap.style=''};
}


/* ✅ DOWNLOAD */
function downloadJPEG(){

  const wrap=document.getElementById('exportWrap');
  wrap.innerHTML=buildExportHTML();

  const node=wrap.firstElementChild;

  toast("Generating...");

  setTimeout(()=>{
    html2canvas(node,{scale:2}).then(canvas=>{
      const a=document.createElement('a');
      a.download='deployment.jpg';
      a.href=canvas.toDataURL();
      a.click();

      wrap.innerHTML='';
      toast("Downloaded ✓");
    });
  },300);
}


/* ✅ TOAST */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

</script>

</body>
</html>
``
