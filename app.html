<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Deployment Editor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --accent: #FFD700;
      --accent2: #FFC700;
      --accent-glow: rgba(255,215,0,0.2);
      --leader-bg: rgba(255,215,0,0.1);
      --bg: #111;
      --surface: #1a1a1a;
      --surface2: #242424;
      --surface3: #2e2e2e;
      --border: #333;
      --text: #f0f0f0;
      --muted: #777;
    }
    :root.green {
      --accent: #4a9e18;
      --accent2: #7bc940;
      --accent-glow: rgba(74,158,24,0.2);
      --leader-bg: rgba(74,158,24,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .svc-name {
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      font-weight: 700;
    }
    .theme-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      transition: border-color .2s, color .2s;
      flex-shrink: 0;
    }
    .theme-pill:hover { border-color: var(--accent); color: var(--text); }
    .theme-dot { width:9px; height:9px; border-radius:50%; background: var(--accent); }
    .btn-dl {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
      flex-shrink: 0;
    }
    .btn-dl:hover { opacity: .85; }

    /* LAYOUT */
    .main { padding: 16px; max-width: 1200px; margin: 0 auto; }

    .sec-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* ZONE PICKER */
    .zone-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .zone-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--surface2);
      color: var(--muted);
      transition: all .2s;
      user-select: none;
    }
    .zone-chip.on { background: var(--accent); border-color: var(--accent); color: #000; }
    .zone-chip.custom { border-style: dashed; }
    .add-zone-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px dashed var(--border);
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      font-family: 'Quicksand', sans-serif;
      transition: all .2s;
      font-weight: 500;
    }
    .add-zone-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* AGENT POOL */
    .pool-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }
    .add-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .add-row input {
      flex: 1;
      min-width: 100px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 11px;
      outline: none;
      transition: border-color .2s;
    }
    .add-row input::placeholder { color: var(--muted); }
    .add-row input:focus { border-color: var(--accent); }
    .btn-sm {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .btn-sm:hover { opacity: .85; }
    .btn-sm.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .pool-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
    .pool-tag {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      transition: border-color .2s;
    }
    .pool-tag:hover { border-color: var(--accent); }
    .pool-tag.dragging { opacity: .35; }
    .pool-tag .rm { color: var(--muted); cursor: pointer; font-size: 13px; }
    .pool-tag .rm:hover { color: #e55; }

    /* BRIEFING */
    .briefing-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }
    .briefing-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .briefing-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 12px;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color .2s;
    }
    .briefing-textarea::placeholder { color: var(--muted); }
    .briefing-textarea:focus { border-color: var(--accent); }

    /* ZONES GRID */
    .zones-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }

    .zone-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .zone-card.over { border-color: var(--accent); background: var(--surface2); }

    .zone-hd {
      background: var(--accent);
      padding: 9px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .zone-hd-title {
      font-size: 18px;
      letter-spacing: 2px;
      color: #000;
      font-weight: 600;
    }
    .zone-hd-rm {
      background: none;
      border: none;
      color: rgba(0,0,0,.55);
      cursor: pointer;
      font-size: 15px;
      padding: 0 3px;
    }
    .zone-hd-rm:hover { color: #000; }

    .zone-body { padding: 8px; min-height: 56px; }

    .agent-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 8px;
      border-radius: 7px;
      margin-bottom: 5px;
      cursor: grab;
      background: var(--surface2);
      border: 1px solid transparent;
      transition: border-color .15s;
      user-select: none;
      white-space: nowrap;
    }
    .agent-row:active { cursor: grabbing; }
    .agent-row.dragging { opacity: .3; }
    .agent-row.leader {
      background: var(--leader-bg);
      border-color: var(--accent);
    }
    .drag-handle { color: var(--muted); font-size: 13px; flex-shrink: 0; }
    .agent-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 4px; }
    .agent-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-row.leader .agent-name { font-weight: 700; color: var(--accent2); }
    .agent-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-row.leader .agent-sub { color: var(--accent); font-weight: 700; }
    .agent-acts { display: flex; gap: 2px; flex-shrink: 0; }
    .ico {
      background: none; border: none;
      cursor: pointer; font-size: 13px;
      padding: 2px 4px; border-radius: 4px;
      color: var(--muted); transition: color .15s, background .15s;
    }
    .ico:hover { color: var(--text); background: var(--surface3); }
    .ldr-badge {
      font-size: 9px; letter-spacing: 1px;
      text-transform: uppercase;
      background: var(--accent); color: #000;
      padding: 2px 5px; border-radius: 3px;
      font-weight: 700; flex-shrink: 0;
    }
    .drop-hint {
      text-align: center; padding: 12px;
      font-size: 12px; color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 7px; margin: 4px;
    }

    /* EXPORT WRAP */
    #exportWrap { position: fixed; left: -9999px; top: 0; width: 1600px; background: #fff; }

    /* PREVIEW MODAL */
    #previewModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 100;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 20px;
    }
    #previewModal.open {
      display: flex;
    }
    .preview-content {
      background: #fff;
      border-radius: 8px;
      overflow: auto;
      max-height: 90vh;
      max-width: 90vw;
    }
    .preview-content > div {
      width: 1600px;
    }
    .preview-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 101;
    }
    .preview-controls button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Quicksand', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .preview-controls button:hover {
      opacity: .85;
    }

    /* TOAST */
    #toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #222; color: #eee;
      padding: 9px 18px; border-radius: 30px;
      font-size: 13px; border: 1px solid #333;
      opacity: 0; transition: opacity .3s, transform .3s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* MODALS */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.8); z-index: 50;
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      width: 100%; max-width: 480px;
      padding: 22px 20px 36px;
      animation: up .2s ease;
    }
    @keyframes up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal h3 {
      font-size: 22px; letter-spacing: 2px;
      color: var(--accent); margin-bottom: 14px;
      font-weight: 700;
    }
    .modal input {
      width: 100%;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 500;
      padding: 10px 12px; outline: none; margin-bottom: 10px;
      transition: border-color .2s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-acts { display: flex; gap: 10px; margin-top: 4px; }
    .modal-acts button { flex: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="svc-name" id="svcName">DEPLOYMENT</div>
  <div class="theme-pill" onclick="toggleTheme()">
    <div class="theme-dot"></div>
    <span id="themeLabel">Phaneroo</span>
  </div>
  <button class="btn-dl" onclick="openPreview()">👁 Preview</button>
  <button class="btn-dl" onclick="exportJPEG()">⬇ JPEG</button>
</div>

<div class="main">

  <div class="sec-label">Active Zones — tap to toggle</div>
  <div class="zone-picker" id="zonePicker"></div>

  <div class="pool-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="sec-label" style="margin:0">Agent Pool</div>
      <button class="btn-sm ghost" style="font-size:12px;padding:5px 12px;" onclick="document.getElementById('csvInput').click()">⬆ Import CSV</button>
      <input type="file" id="csvInput" accept=".csv,.txt" style="display:none" onchange="importCSV(this)">
    </div>
    <div class="add-row">
      <input id="inName"     placeholder="Name"      onkeydown="if(event.key==='Enter') document.getElementById('inCS').focus()">
      <input id="inCS"       placeholder="Call sign" onkeydown="if(event.key==='Enter') document.getElementById('inCon').focus()">
      <input id="inCon"      placeholder="Contact"   onkeydown="if(event.key==='Enter') addAgent()">
      <button class="btn-sm" onclick="addAgent()">Add</button>
    </div>
    <div class="pool-list" id="poolList"></div>
  </div>

  <div class="sec-label">Zones</div>
  <div class="zones-grid" id="zonesGrid"></div>

  <div class="briefing-wrap">
    <div class="briefing-label">Briefing Notes — agents should know</div>
    <textarea id="briefingNotes" class="briefing-textarea" placeholder="Enter any important instructions or information..."></textarea>
  </div>

</div>

<!-- Edit modal -->
<div id="editModal" class="overlay" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3>Edit Agent</h3>
    <input id="eName"  placeholder="Name">
    <input id="eCS"    placeholder="Call sign">
    <input id="eCon"   placeholder="Contact">
    <div class="modal-acts">
      <button class="btn-sm ghost" onclick="closeEdit()">Cancel</button>
      <button class="btn-sm"       onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Custom zone modal -->
<div id="zoneModal" class="overlay" onclick="if(event.target===this)closeZM()">
  <div class="modal">
    <h3>Custom Zone</h3>
    <input id="zmName" placeholder="Zone name e.g. Rooftop" onkeydown="if(event.key==='Enter')addCustomZone()">
    <div class="modal-acts">
      <button class="btn-sm ghost" onclick="closeZM()">Cancel</button>
      <button class="btn-sm"       onclick="addCustomZone()">Add</button>
    </div>
  </div>
</div>

<!-- Preview modal -->
<div id="previewModal" onclick="if(event.target===this)closePreview()">
  <div class="preview-content" id="previewContent"></div>
  <div class="preview-controls">
    <button onclick="closePreview()">✕ Close</button>
    <button onclick="exportJPEG()">⬇ Download</button>
  </div>
</div>

<div id="exportWrap"></div>
<div id="toast"></div>

<script>
/* ─── PRESETS ─── */
const PRESET_ZONES = ['Haven','Lakeside','Ducati','Tally','Support'];

/* ─── STATE ─── */
let S = {
  theme: 'amber',
  serviceName: '',
  serviceId: '',
  zones: [],        // [{id,name,custom}]
  active: [],       // zone ids
  agents: [],       // [{id,name,callsign,contact}]
  za: {},           // {zoneId:[{agentId,leader}]}
  briefing: '',     // briefing notes
};

let dragging     = null; // {id, from:'pool'|zoneId}
let draggingRow  = null; // {agentId,zoneId,idx}
let editingId    = null;

/* ─── BOOT ─── */
(function(){
  const p   = new URLSearchParams(location.search);
  const sid = p.get('service') || localStorage.getItem('activeService') || 'default';
  S.serviceId = sid;

  // Load service name from bond_services
  try {
    const svcs = JSON.parse(localStorage.getItem('bond_services') || '[]');
    const svc  = svcs.find(s => s.id === sid);
    if(svc){ S.serviceName = svc.name; document.getElementById('svcName').textContent = svc.name.toUpperCase(); }
  } catch(e){}

  // Load saved deployment state
  try {
    const saved = localStorage.getItem('deploy_' + sid);
    if(saved) Object.assign(S, JSON.parse(saved));
  } catch(e){}

  // Always guarantee preset zones exist (merge, never lose them)
  PRESET_ZONES.forEach(n=>{
    const id = n.toLowerCase();
    if(!S.zones.find(z=>z.id===id)){
      S.zones.push({id, name:n, custom:false});
    }
  });

  // Guarantee za exists for every zone
  S.zones.forEach(z=>{ if(!S.za[z.id]) S.za[z.id]=[]; });

  applyTheme();
  renderPicker();
  renderPool();
  renderZones();
  document.getElementById('briefingNotes').value = S.briefing;
  document.getElementById('briefingNotes').addEventListener('change', e=>{ S.briefing = e.target.value; save(); });

  if(p.get('mode') === 'download') setTimeout(exportJPEG, 900);
})();

/* ─── SAVE ─── */
function save(){ localStorage.setItem('deploy_'+S.serviceId, JSON.stringify(S)); }

/* ─── THEME ─── */
function applyTheme(){
  document.documentElement.classList.toggle('green', S.theme==='green');
  document.getElementById('themeLabel').textContent = S.theme==='green' ? 'Sunday' : 'Phaneroo';
}
function toggleTheme(){ S.theme = S.theme==='amber'?'green':'amber'; applyTheme(); save(); }

/* ─── ZONE PICKER ─── */
function renderPicker(){
  const el = document.getElementById('zonePicker');
  el.innerHTML = '';
  S.zones.forEach(z=>{
    const c = document.createElement('div');
    c.className = 'zone-chip' + (S.active.includes(z.id)?' on':'') + (z.custom?' custom':'');
    c.textContent = z.name;
    c.onclick = ()=>toggleZone(z.id);
    el.appendChild(c);
  });
  const ab = document.createElement('button');
  ab.className = 'add-zone-btn';
  ab.textContent = '+ Custom';
  ab.onclick = openZM;
  el.appendChild(ab);
}

function toggleZone(id){
  if(S.active.includes(id)){
    const agents = S.za[id]||[];
    if(agents.length && !confirm('Remove zone? Agents return to pool.')) return;
    S.za[id] = [];
    S.active = S.active.filter(z=>z!==id);
  } else {
    S.active.push(id);
    if(!S.za[id]) S.za[id]=[];
  }
  save(); renderPicker(); renderZones();
}

/* ─── CUSTOM ZONES ─── */
function openZM(){ document.getElementById('zmName').value=''; document.getElementById('zoneModal').classList.add('open'); setTimeout(()=>document.getElementById('zmName').focus(),150); }
function closeZM(){ document.getElementById('zoneModal').classList.remove('open'); }
function addCustomZone(){
  const name = document.getElementById('zmName').value.trim(); if(!name) return;
  const id = 'cx-'+name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();
  S.zones.push({id,name,custom:true});
  S.active.push(id); S.za[id]=[];
  save(); closeZM(); renderPicker(); renderZones();
}

/* ─── IMPORT CSV ─── */
function importCSV(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    let added = 0, skipped = 0;
    lines.forEach(line=>{
      if(/^(name|agent|staff|member)[,;\t]/i.test(line)){ skipped++; return; }
      const parts = line.split(/[,;\t]/).map(p=>p.trim().replace(/^["'\s]+|["'\s]+$/g,''));
      const name = parts[0]||''; if(!name){ skipped++; return; }
      const callsign = parts[1]||'';
      const contact  = parts[2]||'';
      const dup = S.agents.find(a=>a.name.toLowerCase()===name.toLowerCase());
      if(dup){ skipped++; return; }
      const id = 'a'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
      S.agents.push({id,name,callsign,contact});
      added++;
    });
    input.value='';
    save();
    renderPool();
    renderZones();
    document.getElementById('poolList').scrollIntoView({behavior:'smooth',block:'nearest'});
    toast(added > 0 ? '✓ '+added+' agents loaded'+(skipped?' · '+skipped+' skipped':'') : 'No new agents — check file format');
  };
  reader.onerror = function(){ toast('Could not read file'); };
  reader.readAsText(file);
}

/* ─── AGENTS ─── */
function addAgent(){
  const name = document.getElementById('inName').value.trim(); if(!name){document.getElementById('inName').focus();return;}
  const cs   = document.getElementById('inCS').value.trim();
  const con  = document.getElementById('inCon').value.trim();
  const id   = 'a'+Date.now()+Math.random().toString(36).slice(2,5);
  S.agents.push({id,name,callsign:cs,contact:con});
  ['inName','inCS','inCon'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('inName').focus();
  save(); renderPool();
}

function usedIds(){ const s=new Set(); Object.values(S.za).forEach(arr=>arr.forEach(a=>s.add(a.agentId))); return s; }

function renderPool(){
  const el   = document.getElementById('poolList');
  const used = usedIds();
  const free = S.agents.filter(a=>!used.has(a.id));
  if(!S.agents.length){ el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:6px">Add agents above then drag them into zones</div>'; return; }
  if(!free.length){ el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:6px">All agents deployed ✓</div>'; return; }
  el.innerHTML='';
  free.forEach(a=>{
    const t = document.createElement('div');
    t.className='pool-tag'; t.draggable=true; t.dataset.id=a.id;
    t.innerHTML=`<span>👤</span><span>${a.name}${a.callsign?' · '+a.callsign:''}</span><span class="rm" onclick="rmAgent('${a.id}')">✕</span>`;
    t.addEventListener('dragstart',e=>{ dragging={id:a.id,from:'pool'}; draggingRow=null; t.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    t.addEventListener('dragend',()=>t.classList.remove('dragging'));
    el.appendChild(t);
  });
}

function rmAgent(id){
  Object.keys(S.za).forEach(z=>{ S.za[z]=S.za[z].filter(a=>a.agentId!==id); });
  S.agents=S.agents.filter(a=>a.id!==id);
  save(); renderPool(); renderZones();
}

/* ─── ZONES ─── */
function renderZones(){
  const grid = document.getElementById('zonesGrid');
  grid.innerHTML='';
  S.active.forEach(zid=>{
    const zone = S.zones.find(z=>z.id===zid); if(!zone) return;
    const card = document.createElement('div');
    card.className='zone-card'; card.dataset.z=zid;

    const hd = document.createElement('div');
    hd.className='zone-hd';
    hd.innerHTML=`<span class="zone-hd-title">${zone.name}</span><button class="zone-hd-rm" onclick="toggleZone('${zid}')">✕</button>`;
    card.appendChild(hd);

    const body = document.createElement('div');
    body.className='zone-body'; body.id='zb-'+zid;
    const zas = S.za[zid]||[];
    if(!zas.length){ body.innerHTML='<div class="drop-hint">Drop agents here</div>'; }
    else {
      zas.forEach((za,idx)=>{
        const ag = S.agents.find(a=>a.id===za.agentId); if(!ag) return;
        body.appendChild(makeAgentRow(ag,za,zid,idx));
      });
    }
    card.appendChild(body);

    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('over');});
    card.addEventListener('dragleave',()=>card.classList.remove('over'));
    card.addEventListener('drop',e=>{e.preventDefault();card.classList.remove('over');drop(zid);});
    grid.appendChild(card);
  });
}

function makeAgentRow(ag,za,zid,idx){
  const row = document.createElement('div');
  row.className='agent-row'+(za.leader?' leader':'');
  row.draggable=true;
  const sub=[ag.callsign,ag.contact].filter(Boolean).join(' · ');
  row.innerHTML=`
    <span class="drag-handle">⠿</span>
    <div class="agent-info">
      <div class="agent-name">${ag.name}</div>
      ${sub?`<div class="agent-sub"> · ${sub}</div>`:''}
    </div>
    ${za.leader?'<span class="ldr-badge">Lead</span>':''}
    <div class="agent-acts">
      <button class="ico" title="${za.leader?'Unset leader':'Set leader'}" onclick="setLeader('${zid}','${ag.id}')">${za.leader?'★':'☆'}</button>
      <button class="ico" title="Edit" onclick="openEdit('${ag.id}')">✎</button>
      <button class="ico" title="Return to pool" onclick="returnPool('${zid}','${ag.id}')">↩</button>
    </div>
  `;
  row.addEventListener('dragstart',e=>{ draggingRow={agentId:ag.id,zoneId:zid,idx}; dragging=null; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  row.addEventListener('dragend',()=>row.classList.remove('dragging'));
  row.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();});
  row.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation();
    if(draggingRow && draggingRow.zoneId===zid) reorder(zid,draggingRow.idx,idx);
    else if(dragging || draggingRow) drop(zid,idx);
  });
  return row;
}

function drop(zid, insertIdx){
  if(dragging){
    const {id,from} = dragging;
    if(from!=='pool') S.za[from]=S.za[from].filter(a=>a.agentId!==id);
    if(!S.za[zid]) S.za[zid]=[];
    if(!S.za[zid].find(a=>a.agentId===id)){
      const entry={agentId:id,leader:false};
      insertIdx!==undefined ? S.za[zid].splice(insertIdx,0,entry) : S.za[zid].push(entry);
    }
    dragging=null;
  } else if(draggingRow && draggingRow.zoneId!==zid){
    const {agentId,zoneId:src}=draggingRow;
    const entry=S.za[src].find(a=>a.agentId===agentId)||{agentId,leader:false};
    S.za[src]=S.za[src].filter(a=>a.agentId!==agentId);
    if(!S.za[zid]) S.za[zid]=[];
    S.za[zid].push({...entry});
    draggingRow=null;
  }
  save(); renderPool(); renderZones();
}

function reorder(zid,from,to){
  const arr=S.za[zid]; const [item]=arr.splice(from,1); arr.splice(to,0,item);
  save(); renderZones();
}

function returnPool(zid,agentId){
  S.za[zid]=S.za[zid].filter(a=>a.agentId!==agentId);
  save(); renderPool(); renderZones();
}

function setLeader(zid,agentId){
  const za=S.za[zid].find(a=>a.agentId===agentId); if(!za) return;
  const was=za.leader;
  S.za[zid].forEach(a=>a.leader=false);
  za.leader=!was;
  if(za.leader){
    S.za[zid]=[za,...S.za[zid].filter(a=>a.agentId!==agentId)];
  }
  save(); renderZones();
}

/* ─── EDIT MODAL ─── */
function openEdit(id){
  const a=S.agents.find(x=>x.id===id); if(!a) return;
  editingId=id;
  document.getElementById('eName').value=a.name;
  document.getElementById('eCS').value=a.callsign||'';
  document.getElementById('eCon').value=a.contact||'';
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('eName').focus(),150);
}
function closeEdit(){ document.getElementById('editModal').classList.remove('open'); editingId=null; }
function saveEdit(){
  const a=S.agents.find(x=>x.id===editingId); if(!a) return;
  a.name=document.getElementById('eName').value.trim()||a.name;
  a.callsign=document.getElementById('eCS').value.trim();
  a.contact=document.getElementById('eCon').value.trim();
  save(); closeEdit(); renderPool(); renderZones();
}

/* ─── EXPORT UTILS ─── */
function buildExportHTML(){
  if(!S.active.length){ toast('No active zones to export'); return null; }
  const isA = S.theme==='amber';
  const acc  = isA ? '#FFD700' : '#4a9e18';
  const ldrBg= isA ? '#fffbea' : '#e8f5e9';
  const ldrBd= isA ? '#FFD700' : '#4a9e18';
  const date = new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const zonesH = S.active.map(zid=>{
    const zone=S.zones.find(z=>z.id===zid); if(!zone) return '';
    const agents=(S.za[zid]||[]);
    const agentsHtml = agents.map((za,idx)=>{
      const a=S.agents.find(x=>x.id===za.agentId); if(!a) return '';
      const sub=[a.callsign,a.contact].filter(Boolean).join(' · ');
      return `<div style="padding:18px;border-radius:8px;margin-bottom:12px;background:${za.leader?ldrBg:'#f9f9f9'};border:1.5px solid ${za.leader?ldrBd:'#e8e8e8'};">
        <div style="font-size:24px;font-weight:${za.leader?'700':'600'};color:${za.leader?acc:'#1a1a1a'};font-family:'Quicksand',sans-serif;line-height:1.3;">${sub}${za.leader?' ★':''}</div>
      </div>`;
    }).join('');
    
    return `<div style="background:#fff;border-radius:12px;overflow:hidden;border:2.5px solid ${acc};box-shadow:0 4px 12px rgba(0,0,0,.1);padding:18px;">
      <div style="background:${acc};padding:14px 18px;border-radius:8px;margin-bottom:14px;">
        <span style="font-family:'Quicksand',sans-serif;font-size:36px;letter-spacing:2px;color:#000;font-weight:600;">${zone.name}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:12px;">${agentsHtml||'<div style="font-size:14px;color:#ccc;padding:10px;">No agents assigned</div>'}</div>
    </div>`;
  }).join('');

  const briefingHtml = S.briefing ? `
    <div style="background:#fafafa;border-radius:10px;padding:20px;margin-bottom:20px;border-left:5px solid ${acc};">
      <div style="font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:${acc};margin-bottom:12px;">BRIEFING NOTES</div>
      <ul style="margin:0;padding-left:24px;font-family:'Quicksand',sans-serif;font-size:16px;line-height:1.8;color:#333;list-style:disc;">
        ${S.briefing.split('\n').filter(l=>l.trim()).map(line=>`<li style="margin-bottom:8px;">${line.trim()}</li>`).join('')}
      </ul>
    </div>
  ` : '';

  return `
    <div style="width:1600px;background:#fff;font-family:'Quicksand',sans-serif;padding:56px;">
      <div style="background:${acc};border-radius:18px;padding:40px;margin-bottom:40px;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-family:'Quicksand',sans-serif;font-size:42px;font-weight:700;color:#000;line-height:1;margin-bottom:8px;">${S.serviceName.toUpperCase()}</div>
          <div style="font-size:26px;font-weight:400;color:rgba(0,0,0,.75);letter-spacing:1px;">DEPLOYMENT</div>
        </div>
        <div style="text-align:right;color:rgba(0,0,0,.7);font-size:16px;line-height:2;font-family:'Quicksand',sans-serif;">
          <div style="font-size:14px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700;">Date</div>
          <div style="font-weight:600;font-size:18px;margin-bottom:8px;">${date}</div>
          <div style="font-size:15px;font-weight:600;opacity:.85;">General Parking</div>
          <div style="font-size:15px;font-weight:600;opacity:.85;">Security Department</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:40px;">${zonesH}</div>
      ${briefingHtml}
      <div style="margin-top:32px;padding-top:18px;border-top:3.5px solid ${acc};display:flex;align-items:center;justify-content:space-between;">
        <span style="font-family:'Quicksand',sans-serif;font-size:28px;letter-spacing:3px;color:#000;font-weight:700;">THE BOND</span>
        <span style="font-size:13px;color:#bbb;font-family:'Quicksand',sans-serif;">Confidential · Internal Use Only</span>
      </div>
    </div>`;
}

/* ─── PREVIEW ─── */
function openPreview(){
  const html = buildExportHTML();
  if(!html) return;
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewModal').classList.add('open');
}

function closePreview(){
  document.getElementById('previewModal').classList.remove('open');
  document.getElementById('previewContent').innerHTML = '';
}

/* ─── JPEG EXPORT ─── */
function exportJPEG(){
  const html = buildExportHTML();
  if(!html) return;
  
  document.getElementById('exportWrap').innerHTML = html;
  toast('Generating…');
  
  setTimeout(()=>{
    html2canvas(document.getElementById('exportWrap').firstElementChild,{
      scale:2, useCORS:true, backgroundColor:'#ffffff', logging:false
    }).then(canvas=>{
      const a=document.createElement('a');
      a.download=`deployment-${(S.serviceName||'bond').replace(/\s+/g,'-').toLowerCase()}-${Date.now()}.jpg`;
      a.href=canvas.toDataURL('image/jpeg',0.96);
      a.click();
      document.getElementById('exportWrap').innerHTML='';
      toast('Downloaded ✓');
    }).catch(()=>{ document.getElementById('exportWrap').innerHTML=''; toast('Export failed — try again'); });
  }, 350);
}

/* ─── TOAST ─── */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
