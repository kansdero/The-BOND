<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BOND Space</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />

  <!-- PWA -->
  <meta name="theme-color" content="#5a9e1a">
  <link rel="manifest" href="manifest.json">

  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6}
    .page{display:none;padding:20px}
    .page.active{display:block}
    .card{background:#fff;padding:20px;border-radius:10px;max-width:420px;margin:40px auto;box-shadow:0 6px 20px rgba(0,0,0,.1)}
    input,button{width:100%;padding:10px;margin-top:10px}
    button{background:#5a9e1a;color:#fff;border:none;border-radius:6px;font-weight:bold}
    button.secondary{background:#d4700a}
    .item{background:white;padding:12px;border-radius:8px;margin-bottom:10px}
    iframe{border:none;width:100%;height:100vh}
  </style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="authPage" class="page active">
  <div class="card">
    <h2>Login</h2>
    <input id="authUser" placeholder="username (admin / unithead)">
    <input id="authPass" type="password" placeholder="password (codename)">
    <button onclick="login()">Login</button>
    <div id="authMsg"></div>
  </div>
</div>

<!-- ================= SERVICES ================= -->
<div id="servicesPage" class="page">
  <h2 style="text-align:center">Services</h2>
  <div id="servicesList" style="max-width:500px;margin:auto"></div>
  <div style="max-width:500px;margin:auto">
    <button onclick="newService()">+ Create Service</button>
  </div>
</div>

<!-- ================= APP LOADER ================= -->
<div id="appPage" class="page">
  <!-- Your original app lives here -->
  <iframe src="app.html"></iframe>
</div>

<script>
/* ================= USERS ================= */
let currentUser = null;
let currentService = null;

function login(){
  const u = authUser.value.trim();
  const p = authPass.value.trim();
  if(!u || !p) return;

  const users = JSON.parse(localStorage.getItem("users") || "{}");

  if(!users[u]){
    users[u] = { password:p, role:u==="admin"?"admin":"user", locked:false };
    localStorage.setItem("users", JSON.stringify(users));
  }

  if(users[u].locked){
    authMsg.innerText = "Account locked. Contact admin.";
    return;
  }

  if(users[u].password !== p){
    users[u].locked = true;
    localStorage.setItem("users", JSON.stringify(users));
    authMsg.innerText = "Wrong password. Account locked.";
    return;
  }

  currentUser = u;
  authPage.classList.remove("active");
  servicesPage.classList.add("active");
  renderServices();
}

/* ================= SERVICES ================= */
function newService(){
  const name = prompt("Service name e.g. Phaneroo 572");
  if(!name) return;
  const id = name.toLowerCase().replace(/\s+/g,"-");

  const services = JSON.parse(localStorage.getItem("services") || "[]");
  services.push({ id, name, created:new Date().toISOString() });
  localStorage.setItem("services", JSON.stringify(services));
  renderServices();
}

function renderServices(){
  servicesList.innerHTML = "";
  const services = JSON.parse(localStorage.getItem("services") || "[]");

  services.forEach(s=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <strong>${s.name}</strong><br>
      <small>${new Date(s.created).toLocaleString()}</small><br><br>
      <button onclick="openService('${s.id}')">Open</button>
    `;
    servicesList.appendChild(div);
  });
}

function openService(id){
  currentService = id;
  servicesPage.classList.remove("active");
  appPage.classList.add("active");

  // Store active service globally
  localStorage.setItem("activeService", id);
}

/* ================= JPEG TITLE FIX ================= */
window.drawDeploymentTitle = function(ctx,w){
  ctx.font="bold 32px Arial";
  ctx.textAlign="center";
  ctx.fillText("DEPLOYMENT", w/2, 52);
};

/* ================= PWA ================= */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
